name: cosmic_wallpaper_studio
description: Creador de wallpapers animados 3D con efecto parallax y estética futurista espacial.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sensors_plus: ^4.0.2
  provider: ^6.1.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  vector_math: ^2.1.4
  photo_view: ^0.15.0
  google_fonts: ^6.1.0
  http: ^1.2.0
  share_plus: ^7.2.2
  flutter_colorpicker: ^1.1.0
  uuid: ^4.3.3
  flutter_local_notifications: ^17.0.0
  sqflite: ^2.3.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
